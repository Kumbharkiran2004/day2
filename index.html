<!DOCTYPE html>
<html>
<head>
    <title>Simple Web App</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }

        input{
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            font-size: 16px;
            margin-left: 5px;
            cursor: pointer;
        }

        #result{
            margin-top: 20px;
            font-size: 22px;
            color: #333;
        }
    </style>
</head>

<body>

<h1>My Simple Web App</h1>

<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="sayHello()">Submit</button>

<div id="result"></div>

<script>
function sayHello(){
    var name = document.getElementById("nameInput").value;

    if(name === ""){
        document.getElementById("result").innerHTML = "Please enter your name!";
    }else{
        document.getElementById("result").innerHTML = "Hello, " + name + " 👋";
    }
}
</script>

</body>
</html>
